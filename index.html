passages.push({
  num: "9-37",
  title: "Why Moths Circle Light",
  fulltext: `There has been a lot of discussion on why moths are attracted to light. The consensus seems to hold that moths are not so much attracted to lights as they are trapped by them. The light becomes a sensory overload that disorients the insects and sends them into a holding pattern. A hypothesis called the Mach band theory suggests that moths see a dark area around a light source and head for it to escape the light. Another theory suggests that moths perceive the light coming from a source as a diffuse halo with a dark spot in the center. The moths, attempting to escape the light, fly toward that imagined "portal," bringing them closer to the source. As they approach the light, their reference point changes and they circle the light hopelessly trying to reach the portal. Everyone is familiar with moths circling their porch lights. Their flight appears to have no purpose, but they are, it is believed, trying to escape the pull of the light.`,

  sentences: [
    {
      en: "There has been a lot of discussion on why moths are attracted to light.",
      slash_en: "There has been / a lot of discussion / on why moths are attracted to light.",
      slash_ko: "있어왔다 / 많은 논의가 / 나방이 왜 빛에 끌리는지에 대한.",
      grammar: [
        { name: "현재완료 There has been", example: "There has been a lot of discussion", point: "★ There + has/have + been = ~이 있어왔다 — 현재까지 지속된 상황 표현" },
        { name: "간접의문문 why + S + V", example: "discussion on why moths are attracted to light", point: "★ 전치사 on의 목적어로 쓰인 간접의문문 — why + 주어 + 동사 어순(도치 없음)" }
      ]
    },
    {
      en: "The consensus seems to hold that moths are not so much attracted to lights as they are trapped by them.",
      slash_en: "The consensus / seems to hold / that moths are / not so much attracted to lights / as they are trapped by them.",
      slash_ko: "통설은 / ~라고 보는 것 같다 / 나방이 ~라고 / 빛에 끌리는 것이 아니라 / 빛에 갇히는 것이라고.",
      grammar: [
        { name: "not so much A as B", example: "not so much attracted to lights as they are trapped by them", point: "★ not so much A as B = A라기보다 B이다 — 수능 최빈출 비교 구문" },
        { name: "seem to V (추측)", example: "seems to hold that...", point: "★ seem to + 동사원형 = ~인 것처럼 보이다 — seem + that절과 동일 의미" }
      ]
    },
    {
      en: "The light becomes a sensory overload that disorients the insects and sends them into a holding pattern.",
      slash_en: "The light becomes / a sensory overload / that disorients the insects / and sends them into a holding pattern.",
      slash_ko: "빛은 ~이 된다 / 감각 과부하 / 곤충들을 방향 감각을 잃게 만들고 / 그들을 맴도는 패턴으로 보내는.",
      grammar: [
        { name: "관계대명사 that (두 동사 병렬)", example: "that disorients the insects and sends them", point: "★ 선행사 overload를 수식하는 that절 안에 disorients와 sends 두 동사 병렬" },
        { name: "send + O + into + 명사", example: "sends them into a holding pattern", point: "★ send A into B = A를 B 상태로 몰아넣다 — 결과 표현" }
      ]

      extraPassages: {
        A: "(A) A subjectively held belief attains objectivity when socially shared; even trained rationalists and scientists are influenced by institutional practices.",
        B: "(B) Subjective experience extends into the external environment and vice versa — institutional laws and equipment become mental institutions affecting our solutions.",
        C: "(C) These institutional influences include bureaucratic procedures, architectural design of health care buildings, courtroom rules, and spatial arrangements designed to shape emotions."
      },

      explanation: "외부 환경이 정신적 제도가 됨을 설명(B) → 사회적 공유와 합리적 훈련에도 제도 영향을 받음(A) → 구체적 제도 관행 나열(C) 순서가 자연스럽다."

      condition: "조건: 본문에서 그대로 찾아 쓸 것. 각 빈칸은 1단어.",
      stem: "In the coupled system, subjective experience extends into the external (A)________, and even trained rationalists find their decisions (B)________ by various institutional practices.",
      answer: "(A) environment  (B) influenced"
    },
    {
      label: "서술형 2 — 내용 서술",
      question: "글에서 제시된 제도적 관행의 예를 세 가지 이상 한국어로 서술하시오.",
      condition: "조건: 한 문장, 60자 내외.",
      answer: "관료적 구조와 절차, 의료 기관의 건축 설계, 법정 재판의 증거 규칙, 유치원과 슈퍼마켓의 공간 배치 등이 있다."

<script>
// ─────────────────────────────────────────────────────
// RENDERING ENGINE
// ─────────────────────────────────────────────────────

let currentPassage = 0;
let currentTab = '전문';

function selectPassage(idx) {
  currentPassage = idx;
  document.querySelectorAll('.passage-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  renderAll();
}

function selectTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(tab));
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.dataset.tab === tab);
  });
}

function renderAll() {
  const p = passages[currentPassage];
  renderPassageTitle(p);
  renderFullText(p);
  renderSentenceAnalysis(p);
  renderVocab(p);
  renderTranslation(p);
  renderTopic(p);
  renderQuiz(p);
  document.getElementById('main').scrollTop = 0;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function circled(n) {
  const nums = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮'];
  return nums[n] || (n+1);
}

// ── Passage Title (in each tab) ──
function renderPassageTitle(p) {
  const box = `<div class="passage-title-box"><div class="p-num">PASSAGE ${escHtml(p.num)}</div><h2>${escHtml(p.title)}</h2></div>`;
  document.querySelectorAll('.passage-title-slot').forEach(el => { el.innerHTML = box; });
}

// ── Tab ①: 전문 ──
function renderFullText(p) {
  const el = document.getElementById('panel-전문');
  el.innerHTML = `
    <div class="passage-title-slot"></div>
    <div class="fulltext-box">${escHtml(p.fulltext)}</div>
  `;
  renderPassageTitle(p);
}

// ── Tab ②: 문장분석 ──
function renderSentenceAnalysis(p) {
  let html = '<div class="passage-title-slot"></div>';
  p.sentences.forEach((s, i) => {
    const gItems = s.grammar.map(g => `
      <div class="grammar-item">
        <span class="g-name">◆ ${escHtml(g.name)}</span>
        <span class="g-example">▶ ${escHtml(g.example)}</span>
        <span class="g-point">${escHtml(g.point)}</span>
      </div>
    `).join('');

    // slash reading
    const slashParts = s.slash_en.split('/');
    const koParts = s.slash_ko.split('/');
    let slashHtml = '<div class="slash-reading">';
    slashParts.forEach((part, j) => {
      slashHtml += `<span class="slash-en">${escHtml(part.trim())}</span>`;
      if (j < slashParts.length - 1) slashHtml += `<span class="slash-sep"> / </span>`;
    });
    slashHtml += '<br>';
    koParts.forEach((part, j) => {
      slashHtml += `<span class="slash-ko">${escHtml(part.trim())}</span>`;
      if (j < koParts.length - 1) slashHtml += `<span class="slash-sep"> / </span>`;
    });
    slashHtml += '</div>';

    html += `
      <div class="sentence-block">
        <div class="sent-num">${circled(i)}</div>
        <div class="sent-english">${escHtml(s.en)}</div>
        ${slashHtml}
        <div class="grammar-items">${gItems}</div>
      </div>
    `;
  });
  const el = document.getElementById('panel-문장분석');
  el.innerHTML = html;
  renderPassageTitle(p);
}

// ── Tab ③: 핵심단어 ──
function renderVocab(p) {
  let html = '<div class="passage-title-slot"></div>';
  p.vocab.forEach(v => {
    html += `
      <div class="vocab-item">
        <span class="vocab-word">◆ ${escHtml(v.word)}</span>
        <span class="vocab-sep">|</span>
        <span class="vocab-meaning">${escHtml(v.meaning)}</span>
        <span class="vocab-sep">|</span>
        <span class="vocab-pos">${escHtml(v.pos)}</span>
        <span class="vocab-sep">|</span>
        <span class="vocab-deriv">${escHtml(v.deriv)}</span>
      </div>
    `;
  });
  const el = document.getElementById('panel-핵심단어');
  el.innerHTML = html;
  renderPassageTitle(p);
}

// ── Tab ④: 전문해석 ──
function renderTranslation(p) {
  const el = document.getElementById('panel-전문해석');
  el.innerHTML = `
    <div class="passage-title-slot"></div>
    <div class="translation-box">${escHtml(p.translation)}</div>
  `;
  renderPassageTitle(p);
}

// ── Tab ⑤: 주제·요지 ──
function renderTopic(p) {
  const steps = p.structure.map(st => `
    <div class="structure-step">
      <span class="step-label">${escHtml(st.label)}</span>
      <span class="step-text">${escHtml(st.text)}</span>
    </div>
  `).join('');

  const el = document.getElementById('panel-주제');
  el.innerHTML = `
    <div class="passage-title-slot"></div>
    <div class="topic-section">
      <div class="section-label">TOPIC · 주제</div>
      <div class="topic-box">${escHtml(p.topic)}</div>
    </div>
    <div class="topic-section">
      <div class="section-label">MAIN IDEA · 요지</div>
      <div class="gist-box">${escHtml(p.gist)}</div>
    </div>
    <div class="topic-section">
      <div class="section-label">STRUCTURE · 구조 흐름</div>
      <div class="structure-steps">${steps}</div>
    </div>
  `;
  renderPassageTitle(p);
}

// ── Tab ⑥: 변형문제 ──
function renderQuiz(p) {
  let html = '<div class="passage-title-slot"></div>';

  p.quiz.forEach((q, qi) => {
    const qId = `q_${currentPassage}_${qi}`;

    let passageHtml = '';
    if (q.passage) {
      passageHtml = `<div class="quiz-passage">${escHtml(q.passage)}</div>`;
    }
    if (q.extraPassages) {
      passageHtml += Object.values(q.extraPassages).map(ep =>
        `<div class="quiz-passage" style="margin-bottom:6px">${escHtml(ep)}</div>`
      ).join('');
    }

    const opts = q.options.map((opt, oi) => `
      <div class="quiz-option" id="${qId}_opt${oi}" onclick="handleQuizClick('${qId}', ${oi}, ${q.answer}, ${qi})">
        <span class="opt-num">${oi + 1}</span>
        <span>${escHtml(opt)}</span>
      </div>
    `).join('');

    html += `
      <div class="quiz-block" id="${qId}_block">
        <div class="quiz-q-num">${qi + 1}번 · ${escHtml(q.type)}</div>
        <div class="quiz-question">${escHtml(q.question)}</div>
        ${passageHtml}
        <div class="quiz-options" id="${qId}_opts">${opts}</div>
        <div class="quiz-explanation" id="${qId}_exp">${escHtml(q.explanation)}</div>
        <button class="reset-btn" onclick="resetQuiz('${qId}', ${q.answer})">↺ 다시 풀기</button>
      </div>
    `;
  });

  // 서술형
  p.essay.forEach((e, ei) => {
    const eId = `essay_${currentPassage}_${ei}`;
    const stemHtml = e.stem ? `<div class="quiz-passage">${escHtml(e.stem)}</div>` : '';
    html += `
      <div class="essay-block">
        <div class="essay-label">${escHtml(e.label)}</div>
        <div class="essay-question">${escHtml(e.question)}</div>
        <div class="essay-condition">${escHtml(e.condition)}</div>
        ${stemHtml}
        <div class="answer-lines">
          <div class="answer-line"></div>
          <div class="answer-line"></div>
          <div class="answer-line"></div>
        </div>
        <button class="answer-toggle-btn" onclick="toggleAnswer('${eId}')">모범답안 확인</button>
        <div class="model-answer" id="${eId}_ans">${escHtml(e.answer)}</div>
      </div>
    `;
  });

  const el = document.getElementById('panel-변형문제');
  el.innerHTML = html;
  renderPassageTitle(p);
}

function handleQuizClick(qId, chosen, correct, qi) {
  const opts = document.querySelectorAll(`[id^="${qId}_opt"]`);
  opts.forEach(o => { o.style.pointerEvents = 'none'; });

  const chosenEl = document.getElementById(`${qId}_opt${chosen}`);
  const correctEl = document.getElementById(`${qId}_opt${correct}`);

  if (chosen === correct) {
    chosenEl.classList.add('correct');
    chosenEl.querySelector('.opt-num').textContent = '✓';
  } else {
    chosenEl.classList.add('incorrect');
    chosenEl.querySelector('.opt-num').textContent = '✗';
    correctEl.classList.add('reveal-correct');
    correctEl.querySelector('.opt-num').textContent = '✓';
  }

  const exp = document.getElementById(`${qId}_exp`);
  if (exp) exp.classList.add('show');
}

function resetQuiz(qId, correct) {
  const opts = document.querySelectorAll(`[id^="${qId}_opt"]`);
  opts.forEach((o, i) => {
    o.style.pointerEvents = '';
    o.classList.remove('correct', 'incorrect', 'reveal-correct');
    o.querySelector('.opt-num').textContent = i + 1;
  });
  const exp = document.getElementById(`${qId}_exp`);
  if (exp) exp.classList.remove('show');
}

function toggleAnswer(eId) {
  const ans = document.getElementById(`${eId}_ans`);
  if (ans) {
    ans.classList.toggle('show');
    const btn = ans.previousElementSibling;
    if (btn) btn.textContent = ans.classList.contains('show') ? '모범답안 숨기기' : '모범답안 확인';
  }
}

// ── INIT ──
window.onload = function() {
  renderAll();
  selectTab('전문');
};
</script>
</div><!-- #content -->
</div><!-- #main -->
</body>
</html>
